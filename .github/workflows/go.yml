name: Go

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...

    - name: Vet
      run: go vet ./...

    - name: Add to go proxy
      run: |
        MODULE_NAME=$(go list -m)
        MODULE_VERSION=${GITHUB_REF#refs/tags/v}
        GOPROXY=https://proxy.golang.org go mod download "${MODULE_NAME}@${MODULE_VERSION}"
      if: startsWith(github.ref, 'refs/tags/v')
